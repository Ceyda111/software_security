<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
</head>
<body>

    <h2>Admin Panel</h2>

    <a href="/dashboard">Back to Dashboard</a><br><br>

    <h3>All Users</h3>

    <table border="1" cellpadding="10">

        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Role</th>
        </tr>

        {% for user in users %}

        <tr>
            <td>{{ user[0] }}</td>
            <td>{{ user[1] }}</td>
            <td>{{ user[2] }}</td>
        </tr>

        {% endfor %}

    </table>

</body>
</html>
